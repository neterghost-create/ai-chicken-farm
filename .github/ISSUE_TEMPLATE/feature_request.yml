name: ✨ Feature Request
description: 提議新功能 / 新訂閱格式 / 新發現源 / Suggest a new feature
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        歡迎 feature request！但請先想清楚:
        - 這個功能是否符合「個人 + 朋友自用」的項目定位
        - 是否會引入商業化/監控/廣告等不合適的東西

        Welcome! Please make sure your idea fits the "personal + friends-only" scope.

  - type: textarea
    id: problem
    attributes:
      label: 你想解決什麼問題 / What problem are you trying to solve?
      description: 描述場景, 不要直接給解法 / Describe the use case before the solution
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建議的方案 / Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考慮過的替代方案 / Alternatives considered
      description: 為什麼選這個而不是其他

  - type: dropdown
    id: scope
    attributes:
      label: 影響範圍 / Scope
      options:
        - 評分機制 (scoring)
        - 自動發現 (discover-airports)
        - ss-monitor 前端 (UI / i18n)
        - ss-monitor 後端 (api.py)
        - 訂閱格式 (subscription output)
        - cron / 監控
        - 文檔 (DEPLOYMENT.md / README)
        - CI / GitHub Actions
        - 其他 / Other
    validations:
      required: true

  - type: checkboxes
    id: scope-check
    attributes:
      label: 範圍確認 / Scope check
      options:
        - label: 不涉及商業化 / 付費訂閱 / 廣告
          required: true
        - label: 不涉及自動爬 Telegram / 法律灰色內容
          required: true
        - label: 不會破壞 DEPLOYMENT.md §9.4 五條隱含時序假設 (cron 改動才需勾)
